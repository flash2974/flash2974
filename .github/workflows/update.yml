name: Update README

on:
    schedule:
        - cron: "0 0 * * *"

    workflow_dispatch:

    push:
        branches:
            - main

jobs:
    update:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout profile repo
              uses: actions/checkout@v4
              with:
                token: ${{ secrets.PAT }}
                fetch-depth: 0

            - name: Checkout website repo
              uses: actions/checkout@v4
              with:
                  repository: flash2974/flash2974.github.io
                  token: ${{ secrets.WEBSITE_TOKEN }}
                  path: website

            - name: Copy file
              run: |
                  cp website/portfolio.json portfolio.json

            - name: Setup Python
              uses: actions/setup-python@v5
              with: 
                python-version: "3.11"

            - name: Generate README
              run: python generate_readme.py

            - name: Commit changes
              run: |
                git config user.name github-actions
                git config user.email github-actions@github.com

                git add README.md

                git diff --cached --quiet || (
                    git commit -m "Auto-update README"
                    git push
                )
