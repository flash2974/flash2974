name: Generate languages card

on:
    schedule: # execute every 12 hours
        - cron: "0 0 * * *"

    workflow_dispatch:

    push:
        branches:
            - main

jobs:
    generate:
        permissions:
            contents: write
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: generate languages.svg
              uses: readme-tools/github-readme-stats-action@v1
              with:
                  card: top-langs
                  options: username=${{ github.repository_owner }}&locale=en&hide_title=false&layout=compact&card_width=320&langs_count=6&theme=midnight-purple&hide_border=false&custom_title=My%20favorite%20languages%20%F0%9F%91%80
                  path: dist/languages.svg
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: push languages.svg to the output branch
              uses: crazy-max/ghaction-github-pages@v3.1.0
              with:
                  target_branch: languages-output
                  build_dir: dist
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
